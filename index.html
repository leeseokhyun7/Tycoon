<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="description" content="겨울 장터 붕어빵 가게를 운영하는 모바일형 타이쿤 게임" />
    <title>붕어빵 거리: 스노우마켓</title>
    <link rel="preload" href="styles.css" as="style" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="phone-game" aria-label="붕어빵 거리 게임">
      <section id="introScreen" class="intro-screen" role="dialog" aria-modal="true" aria-labelledby="introTitle">
        <img class="intro-bg" src="assets/new/intro.png" alt="" />
        <div class="intro-shade" aria-hidden="true"></div>
        <div class="intro-panel">
          <h2 id="introTitle" class="sr-only">붕어빵 타이쿤</h2>
          <div class="intro-stats" aria-label="저장 정보">
            <span id="introDayText">DAY 1</span>
            <span id="introBestText">최고 0원</span>
          </div>
          <button id="startGameButton" class="start-button" type="button">
            <span>새로 시작</span>
          </button>
        </div>
      </section>

      <section class="playfield" aria-label="영업 화면">
        <img class="town-bg" src="assets/new/world.png" alt="" />
        <div class="snow-layer snow-a" aria-hidden="true"></div>
        <div class="snow-layer snow-b" aria-hidden="true"></div>

        <header class="game-hud">
          <div class="title-lockup">
            <img src="assets/shop-mark.svg" width="52" height="52" alt="" />
            <div>
              <span id="dayText" class="day-chip">DAY 1</span>
              <h1>붕어빵 거리</h1>
            </div>
          </div>
          <div class="hud-actions">
            <button id="musicButton" class="round-button" type="button" aria-label="배경음악 끄기" title="배경음악">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M9 18V6l10-2v12" />
                <circle cx="7" cy="18" r="2" />
                <circle cx="17" cy="16" r="2" />
              </svg>
            </button>
            <button id="pauseButton" class="round-button" type="button" aria-label="일시정지" title="일시정지">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M8 5v14M16 5v14" />
              </svg>
            </button>
          </div>
        </header>

        <section class="resource-board" aria-label="재화와 목표">
          <div class="resource-pill coin-pill">
            <span class="coin-icon" aria-hidden="true">₩</span>
            <span class="resource-copy">
              <small>매출</small>
              <strong id="coinsText">0원</strong>
            </span>
          </div>
          <div class="resource-pill time-pill">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="8" />
              <path d="M12 7v5l3 2" />
            </svg>
            <span class="resource-copy">
              <small>시간</small>
              <strong id="timerText">01:00</strong>
            </span>
          </div>
          <div class="goal-track">
            <div class="goal-copy">
              <span id="goalLabel">목표 0원</span>
              <strong id="revenueText">0원</strong>
            </div>
            <div class="goal-bar" aria-hidden="true"><span id="goalFill"></span></div>
          </div>
        </section>

        <section class="customer-stage" aria-label="손님 주문">
          <div id="orders" class="customer-line" aria-live="polite"></div>
          <img class="mascot" src="assets/mascot.svg" width="96" height="112" alt="" />
        </section>

        <section class="stall-zone" aria-label="붕어빵 가판대">
          <img class="stall-cart" src="assets/new/ui.png" alt="" />
          <div class="combo-ribbon">
            <span>COMBO</span>
            <strong id="comboText">x1.0</strong>
          </div>
          <div id="displayCase" class="display-case" aria-label="완성 붕어빵 진열대"></div>
          <div class="grill-card">
            <div id="grill" class="grill-grid" aria-label="붕어빵 조리판"></div>
          </div>
        </section>
      </section>

      <section class="control-dock" aria-label="조작 패널">
        <div id="recipes" class="recipe-strip" aria-label="속재료 선택"></div>
        <nav class="nav-row" aria-label="관리 메뉴">
          <button id="missionsButton" class="nav-button" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M6 3h9l3 3v15H6V3Z" />
              <path d="M9 12h6M9 16h4" />
            </svg>
            <span>미션</span>
          </button>
        </nav>
      </section>

      <section id="missionsSheet" class="sheet hidden" aria-label="미션">
        <div class="sheet-panel">
          <div class="sheet-head">
            <div>
              <span class="sheet-kicker">TODAY</span>
              <h2>미션</h2>
            </div>
            <button class="round-button close-sheet" type="button" data-close="missionsSheet" aria-label="미션 닫기">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6l12 12M18 6 6 18" /></svg>
            </button>
          </div>
          <div id="missionList" class="mission-list"></div>
        </div>
      </section>

      <section id="daySummary" class="summary hidden" role="dialog" aria-modal="true" aria-labelledby="summaryTitle">
        <div class="summary-panel">
          <div id="summaryResultsView" class="summary-view">
            <span class="sheet-kicker">CLOSED</span>
            <h2 id="summaryTitle">영업 결과</h2>
            <div id="summaryStats" class="summary-grid"></div>
            <div class="summary-actions">
              <button id="summaryShopButton" class="secondary-button" type="button">상점 확인</button>
              <button id="summaryButton" class="primary-button" type="button">다음 영업 시작</button>
            </div>
          </div>
          <div id="summaryShopView" class="summary-view hidden" aria-label="상점">
            <div class="shop-wallet" aria-label="보유 코인">
              <span class="coin-icon" aria-hidden="true">₩</span>
              <strong id="shopCoinsText">0</strong>
            </div>
            <div class="sheet-head">
              <button id="summaryBackButton" class="round-button" type="button" aria-label="영업 결과로 돌아가기">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 6l-6 6 6 6" /></svg>
              </button>
              <div>
                <span class="sheet-kicker">SNOW MARKET</span>
                <h2>상점</h2>
              </div>
              <span class="sheet-head-spacer" aria-hidden="true"></span>
            </div>
            <div id="upgradeList" class="shop-list"></div>
            <h3>레시피</h3>
            <div id="recipeShop" class="shop-list recipe-shop"></div>
          </div>
        </div>
      </section>

      <div id="toast" class="toast" role="status" aria-live="polite"></div>
    </main>
    <script src="script.js"></script>
  </body>
</html>
